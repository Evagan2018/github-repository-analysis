name: Collect Daily Traffic

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: repository-analysis-daily-traffic
  cancel-in-progress: false

jobs:
  collect-daily-traffic:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate GitHub traffic token
        env:
          REPOSITORY_ANALYSIS_TOKEN: ${{ secrets.REPOSITORY_ANALYSIS_TOKEN }}
        run: |
          if [ -z "${REPOSITORY_ANALYSIS_TOKEN}" ]; then
            echo "::error::Missing repository secret REPOSITORY_ANALYSIS_TOKEN."
            echo "Add a token that can read repository traffic for the tracked repositories."
            exit 1
          fi

      - name: Collect daily traffic
        env:
          GITHUB_TOKEN: ${{ secrets.REPOSITORY_ANALYSIS_TOKEN }}
          GH_TOKEN: ${{ secrets.REPOSITORY_ANALYSIS_TOKEN }}
        run: |
          python scripts/07_Collect_Daily_Traffic.py data/db/Repository_Analysis.sqlite

      - name: Export dashboard data
        run: |
          python scripts/06_Export_SQLite_To_JSON.py \
            data/db/Repository_Analysis.sqlite \
            docs/data/dashboard_data.json

      - name: Commit updated database and dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            data/db/Repository_Analysis.sqlite \
            docs/data/dashboard_data.json \
            docs/data/dashboard_data.js

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update repository traffic data"
          git push

      - name: Upload dashboard for GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: collect-daily-traffic
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5