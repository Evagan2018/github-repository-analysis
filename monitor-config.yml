## =============================================================================
## Product WATCH
## Add or remove entries here to control which workflows appear in the
## "Product Watch" dashboard tab. Each entry requires owner, repo, and workflow.
## Run `npm run monitor` after editing to regenerate product-workflow-targets.json.
## =============================================================================

product_workflows:
  - owner: Open-CMSIS-Pack
    repos:
      - name: devtools
        workflows:
          - name: nightly.yml
            event: schedule
            priority: high

      - name: cmsis-toolbox
        workflows:
          - name: nightly.yml
            event: workflow_dispatch
            priority: high

      - name: vscode-cmsis-solution
        workflows:
          - name: nightly.yml
            event: workflow_dispatch
            priority: high

      - name: vscode-cmsis-debugger
        workflows:
          - name: nightly.yml
            event: schedule
            priority: low

      - name: vscode-cmsis-sds
        workflows:
          - name: nightly.yml
            event: schedule
            priority: medium

  - owner: pyocd
    repos:
      - name: pyOCD
        workflows:
          - name: nightly.yaml
            event: schedule
            priority: low

  - owner: ARM-software
    repos:
      - name: SDS-Framework
        workflows:
          - name: build_sdsio-server.yml
            event: schedule
            priority: medium
      - name: MDK-Middleware
        workflows:
