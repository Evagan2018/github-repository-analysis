# GitHub Workflow Monitoring Configuration
# This file defines which repositories and workflows to monitor
# branch defaults to "main" and event defaults to "schedule" if not specified

repositories:

## =============================================================================
## SECTION ARM-SOFTWARE
## =============================================================================

  - owner: ARM-software
    repos:
      - name: ACI-GetStarted
        workflows:
          - name: GPR-example.yml
            event: workflow_run
          - name: GPR-test.yml
            event: workflow_run
          - name: MVE-example.yml
            event: workflow_run
          - name: MVE-test.yml
            event: workflow_run
          - name: build-plugins-linux.yml
            event: workflow_dispatch
          - name: build-plugins-windows.yml
            event: workflow_dispatch

      - name: AVH-MLOps
        workflows:
          - name: base_image_build.yml
            event: workflow_dispatch
          - name: licensed_image_build.yml
          - name: licensed_image_build_community.yml

      - name: CMSIS_6
        workflows:
          - name: core.yml
            event: push
          - name: corevalidation.yml
            event: push

      - name: CMSIS-Compiler
        workflows:
          - name: example.yml
            event: push

      - name: CMSIS-DSP
        workflows:
          - name: runtest.yaml
            event: workflow_dispatch
          - name: runcpptest.yaml
            event: workflow_dispatch
          - name: runneontest.yaml
            event: workflow_dispatch
          - name: runwinarm.yml
            event: workflow_dispatch

      - name: CMSIS-FreeRTOS
        workflows:
          - name: build.yaml
            event: workflow_dispatch
          - name: examples.yaml
            event: workflow_dispatch
          - name: cmsis_rv2.yaml
            event: workflow_dispatch

      - name: CMSIS-NN
        workflows:
          - name: pdsc.yml
            event: push

      - name: CMSIS-RTOS2_Validation
        workflows:
          - name: build.yml
            event: workflow_dispatch
          - name: cmsis_rv2.yml
            event: workflow_dispatch

      - name: CMSIS-View
        workflows:
          - name: eventlist.yml
            event: push
          - name: tpip-check.yml


